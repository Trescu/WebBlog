<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebBlog – Admin</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <header class="site-header">
        <div class="container header-top">
            <div>
                <h1><a href="/" class="brand-link">WebBlog</a></h1>
                <p class="subtitle">Admin felület</p>
            </div>
            <div id="auth-nav"></div>
        </div>
    </header>

    <main class="container">
        <section class="page-section auth-page auth-page--wide">
            <a href="/" class="back-link">← Vissza a főoldalra</a>

            <div id="admin-status" class="status-box">Betöltés...</div>

            <div id="admin-content" class="hidden">
                <section class="admin-section">
                    <div class="section-header">
                        <h2>Összes bejegyzés</h2>
                    </div>
                    <div id="admin-posts-list" class="post-list"></div>
                </section>

                <section class="admin-section">
                    <div class="section-header">
                        <h2>Összes komment</h2>
                    </div>
                    <div id="admin-comments-list" class="post-list"></div>
                </section>
            </div>
        </section>
    </main>

    <script src="/auth.js"></script>
    <script src="/admin.js"></script>
    <script src="/sw-register.js"></script>
</body>
</html>
